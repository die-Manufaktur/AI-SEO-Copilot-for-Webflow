name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: |
          if ! pnpm install --frozen-lockfile; then
            echo "Frozen lockfile failed, regenerating lockfile..."
            rm -f pnpm-lock.yaml
            pnpm install
          fi

      - name: Build project
        run: pnpm build

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create Draft Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Retry semantic-release up to 3 times with backoff for 502 errors
          for i in {1..3}; do
            echo "Attempt $i: Running semantic-release..."
            if npx semantic-release --debug; then
              echo "✅ Semantic release completed successfully"
              break
            else
              exit_code=$?
              echo "❌ Semantic release failed (exit code: $exit_code)"
              
              if [ $i -lt 3 ]; then
                echo "⏳ Waiting 30 seconds before retry..."
                sleep 30
              else
                echo "💥 All retries exhausted, failing workflow"
                exit $exit_code
              fi
            fi
          done

      - name: Deploy Worker to Cloudflare
        if: success()
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Only deploy if semantic-release created a new tag
          LATEST_TAG=$(git tag --sort=-version:refname | head -n1)
          PREVIOUS_TAG=$(git tag --sort=-version:refname | sed -n '2p')

          if [ "$LATEST_TAG" != "$PREVIOUS_TAG" ] && [ -n "$LATEST_TAG" ]; then
            echo "🚀 New release detected: ${LATEST_TAG}"

            if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
              echo "⚠️ CLOUDFLARE_API_TOKEN not set — skipping worker deployment"
              echo "ℹ️ Add CLOUDFLARE_API_TOKEN to GitHub secrets to enable auto-deploy"
              exit 0
            fi

            npx wrangler deploy workers/index.ts --env production
            echo "✅ Worker deployed to production"
          else
            echo "ℹ️ No new release — skipping worker deployment"
          fi

      - name: Commit Version Updates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add package.json webflow.json wrangler.toml CHANGELOG.md
            LATEST_TAG=$(git tag --sort=-version:refname | head -n1)
            git commit -m "chore(release): ${LATEST_TAG} [skip ci]"
            
            BRANCH_NAME="release/${LATEST_TAG}"
            git checkout -b "$BRANCH_NAME"
            git push origin "$BRANCH_NAME"
            
            echo "✅ Pushed version updates to branch: ${BRANCH_NAME}"
            echo "ℹ️ Auto-PR workflow will create the pull request"
          else
            echo "ℹ️ No version updates to commit"
          fi